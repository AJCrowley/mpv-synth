alang=en,eng # Auto select audio language
autoload-files=yes
border=yes
force-window=yes
gpu-api=auto
hwdec=auto
hwdec-codecs=all
idle=no
keep-open=no
osc=no
osd-duration=2000
osd-playing-msg=${filename}
profile-restore=copy
reset-on-next-file=video-zoom,video-pan-y,pause
save-position-on-quit=yes
save-watch-history=yes
screenshot-dir=~~desktop/
screenshot-template=mpv screenshot %p %f
sid=no #select no subtitles by default, even if slang matches, override with script-opts/auto-subs.conf
slang=en,eng # Auto select subs language. For more complex subtitle auto-selection, see auto-subs.conf in script-opts
snap-window=yes
sub-auto=fuzzy # fuzzy allows for partial matches, e.g. "en" will match "english"
title=${filename}
title-bar=no
write-filename-in-watch-later-config=yes

# =============================================================================
# QUALITY PROFILE  (default -- requires a reasonably modern GPU)
# Comment out this block and uncomment PERFORMANCE PROFILE below if you
# experience dropped frames or stuttering on 4K content.
# =============================================================================
correct-downscaling=yes
libplacebo-opts=preset=high_quality,deband=yes
vo=gpu-next

# =============================================================================
# PERFORMANCE PROFILE  (for older/slower machines or integrated graphics)
# Uncomment this block and comment out QUALITY PROFILE above.
# Uses the legacy renderer which has lower CPU and GPU overhead.
# =============================================================================
#gpu-context=d3d11
#vo=gpu
