alang=en,eng # Auto select audio language
autoload-files=yes
border=yes
force-window=yes
gpu-api=d3d11
hwdec=auto
hwdec-codecs=auto-safe
idle=no
keep-open=no
osc=no
osd-duration=2000
osd-playing-msg=${filename}
profile-restore=copy
reset-on-next-file=video-zoom,video-pan-y,pause
save-position-on-quit=yes
save-watch-history=yes
screenshot-dir=~~desktop/
screenshot-template=mpv screenshot %p %f
snap-window=yes

# =============================================================================
# SUBTITLE SETTINGS
# =============================================================================
sid=no # select no subtitles by default, even if slang matches, allows auto-subs plugin to determine subtitle selection, settings in script-opts/auto-subs.conf
sub-auto=fuzzy # fuzzy allows for partial matches, e.g. "en" will match "english"
slang=en # Auto select subs language. For more complex subtitle auto-selection, see auto-subs.conf in script-opts

# Forces a drop shadow and border on subtitles, which can be useful for visibility on bright backgrounds. You can customize the colors and sizes below.
sub-ass-override=force
sub-font-size=40
sub-color="#ffdb00"
sub-border-color="#000000"
sub-border-size=1
sub-shadow-offset=1
sub-shadow-color="#000000"
sub-bold=no
sub-margin-y=50
# =============================================================================

title=${filename}
title-bar=no
write-filename-in-watch-later-config=yes

# =============================================================================
# QUALITY PROFILE  (default -- requires a reasonably modern GPU)
# Comment out this block and uncomment PERFORMANCE PROFILE below if you
# experience dropped frames or stuttering on 4K content.
# =============================================================================
correct-downscaling=yes
libplacebo-opts=preset=high_quality,upscaler=ewa_lanczos4sharpest,downscaler=lanczos,deband=yes,deband_iterations=2,deband_threshold=6,deband_grain=6,sigmoid=yes
vo=gpu-next

# =============================================================================
# PERFORMANCE PROFILE  (for older/slower machines or integrated graphics)
# Uncomment this block and comment out QUALITY PROFILE above.
# Uses the legacy renderer which has lower CPU and GPU overhead.
# =============================================================================
#vo=gpu
#libplacebo-opts=preset=fast,upscaler=bilinear,downscaler=box,deband=no,sigmoid=no,skip_aa=yes,disable_linear=yes,disable_fbos=yes