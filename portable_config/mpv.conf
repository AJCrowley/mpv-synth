# =============================================================================
# LANGUAGE & SUBTITLE SETTINGS
# =============================================================================
# Auto select audio language
alang=en,eng
# select no subtitles by default, even if slang matches, allows auto-subs plugin to determine subtitle selection, settings in script-opts/auto-subs.conf
sid=no
# fuzzy allows for partial matches, e.g. "en" will match "english", irrelevant if we're relying on auto-subs plugin
# sub-auto=fuzzy
# Auto select subs language. For more complex subtitle auto-selection, see auto-subs.conf in script-opts
# slang=en
# Forces a drop shadow and border on subtitles, which can be useful for visibility on bright backgrounds. You can customize the colors and sizes below.
sub-ass-override=yes
sub-font-size=40
sub-color="#ffdb00"
sub-border-color="#000000"
sub-border-size=1
sub-shadow-offset=1
sub-shadow-color="#000000"
sub-bold=no
sub-margin-y=50
# =============================================================================
# APP BEHAVIOURS & WINDOW SETTINGS
# =============================================================================
# Auto load other media in folder and treat folder as a playlist
autoload-files=yes
profile-restore=copy
reset-on-next-file=video-zoom,video-pan-y,pause
save-position-on-quit=yes
save-watch-history=yes
screenshot-dir=~~desktop/
screenshot-template=mpv screenshot %p %f
title=${filename}
title-bar=no
write-filename-in-watch-later-config=yes
# Window behaviour
border=yes
force-window=yes
snap-window=yes
# Close app when no more media to play
idle=no
keep-open=no
# On screen controls
osc=no
osd-duration=2000
osd-playing-msg=${filename}
# =============================================================================
# AUDIO SETTINGS
# =============================================================================
# force audio filter -> af=surround:chl_out=5.1
# force audio channels -> audio-channels=5.1
# force audio device (get device handle from ```mpv --audio-device=help``` command) -> audio-device='wasapi/{f42c89cc-2794-496d-a787-952f5bb01610}'
# Set audio passthrough on selected formats, will be processed by sound system, not Windows
# mpv doesn't have license to decode so passthrough is best option
#ao=wasapi  # set audio output to Windows Audio Session API (WASAPI)
#audio-spdif=ac3,dts,dts-hd,eac3,truehd # Passthrough audio formats, will be processed by sound system, not Windows
#audio-exclusive=yes # Enable exclusive mode for audio output, which can reduce latency and improve audio quality, but will prevent other applications from playing audio at the same time.
audio-channels=7.1,5.1,stereo # Set audio channels to 7.1, fallback to 5.1, then stereo
# =============================================================================
# VIDEO RENDER SETTINGS
# =============================================================================
gpu-api=d3d11
hwdec=auto
# Safer option -> hwdec-codecs=auto-safe
hwdec-codecs=auto
# =============================================================================
# QUALITY PROFILE  (default -- requires a reasonably modern GPU)
# Comment out this block and uncomment PERFORMANCE PROFILE below if you
# experience dropped frames or stuttering on 4K content.
# =============================================================================
correct-downscaling=yes
libplacebo-opts=preset=high_quality,upscaler=ewa_lanczos4sharpest,downscaler=lanczos,deband=yes,deband_iterations=2,deband_threshold=6,deband_grain=6,sigmoid=yes
vo=gpu-next
# =============================================================================
# PERFORMANCE PROFILE  (for older/slower machines or integrated graphics)
# Uncomment this block and comment out QUALITY PROFILE above.
# Uses the legacy renderer which has lower CPU and GPU overhead.
# =============================================================================
#vo=gpu
#libplacebo-opts=preset=fast,upscaler=bilinear,downscaler=box,deband=no,sigmoid=no,skip_aa=yes,disable_linear=yes,disable_fbos=yes
# =============================================================================
# EXAMPLE HOW TO ADD CUSTOM FILTERS TO 'PROFILE' MENU
# =============================================================================
# Set output to 5.1 as profile option, either upmix stereo or downmix 7.1
[5.1-upmix]
profile-desc=Mix non 5.1 audio to 5.1
profile-cond=get("audio-params/channel-count", 0) ~= 6
af=format=channels=5.1
profile-restore=copy