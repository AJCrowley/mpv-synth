# icc-detect.conf

# Master on/off switch
#enabled=yes

# Enable icc-profile-auto for SDR content.
# Useful if you have a calibrated display or a display with a good EDID profile.
#icc_for_sdr=yes

# Tone mapping algorithm used when HDR content is played on an SDR display.
# bt.2390 is the broadcast standard and generally looks most natural.
# Options: bt.2390, reinhard, hable, mobius, linear, none
#tone_mapping=bt.2390

# Show OSD notification when colour profile is detected
#osd_notify=yes

# How long to show the OSD notification (seconds)
#osd_duration=5
