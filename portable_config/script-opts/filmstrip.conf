#thumbnail_count=150

# ── Thumbnail height ───────────────────────────────────────────────────
#   Controls how tall the filmstrip is, as a percentage of the uosc
#   timeline height. 100=fill the full timeline (default). Lower values
#   leave the top portion of the timeline bar visible above the filmstrip.
#
#   Examples:
#     thumbnail_height_percent=100   → full timeline height  (default)
#     thumbnail_height_percent=75    → 75% — a tasteful gap at the top
#     thumbnail_height_percent=50    → half height
#
#   This setting works with both manual_position=yes and manual_position=no.
#   When manual_position=yes and bar_height>0, bar_height still sets an
#   absolute pixel ceiling, and thumbnail_height_percent is applied on top.
#thumbnail_height_percent=80

# ── Slice alignment ────────────────────────────────────────────────────
#   left    → sample at START  of slot · left   pixels shown
#   centre  → sample at MIDDLE of slot · centre pixels shown  (default)
#   right   → sample at END    of slot · right  pixels shown
#slice_align="centre"

# ── Resize behaviour ───────────────────────────────────────────────────
#   remap      → INSTANT. Cached thumbnails re-composited immediately.
#   regenerate → ACCURATE. Full rebuild at new geometry.
#resize_behavior="remap"

# ── Slide animation ────────────────────────────────────────────────────
# Duration of the Y-position slide in milliseconds. 0=instant.
#animation_duration=100

# Frames per second for animation.
#animation_fps=30

#-- ── Timeout before starting hide animation──────────────────────────────
#idle_timeout=0

# ── uosc Timeline auto-detection ───────────────────────────────────────
#uosc_timeline_size_max=78
#uosc_scale=1
#uosc_scale_fullscreen=1

# ── Manual position ────────────────────────────────────────────────────
#   When manual_position=yes you can override individual values below.
#   bar_height: absolute pixel height (0=use thumbnail_height_percent
#               of the auto-detected timeline height instead).
#   bar_y:      -1=auto-pin to bottom of screen.
#manual_position=yes
#bar_x=0
#bar_y=-1,   # -1=auto pin to bottom
#bar_width=0
#bar_height=0,    # 0=derive from thumbnail_height_percent (recommended)

# ── Generation ─────────────────────────────────────────────────────────
#max_concurrent=4
#hwdec="auto"

# ── Process priority by video height ───────────────────────────────────
# Comma-separated "height=priority" pairs (Linux/macOS only via nice).
# The highest threshold <= video height wins. Falls back to
# process_priority_default if no threshold matches.
# Valid priorities: idle, low, normal, high
#process_priority_map="720=normal,1080=low,1440=idle,2160=idle"
#process_priority_default="low"

# ── Misc ───────────────────────────────────────────────────────────────
#overlay_id=10
#mpv_path="mpv"
#temp_dir=""