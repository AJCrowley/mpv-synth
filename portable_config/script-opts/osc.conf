# osc.conf — Dark-Box-ish tuning for mpv/mpv.net

# Visibility & behavior
showwindowed=yes
showfullscreen=yes
visibility=auto
hidetimeout=1800
fadeduration=300
minmousemove=3
vidscale=yes
scalewindowed=1.15
scalefullscreen=1.00

# Layout & style
layout=box
seekbarstyle=bar

# Buttons / controls
windowcontrols=yes

# Info & title
title=${media-title}
timetotal=yes

# Misc compatibility
seekbarkeyframes=yes
seekrangealpha=160

scalewindowed=1
scalefullscreen=1

layout=box
seekbarstyle=bar
deadzonesize=0
minmousemove=3
vidscale=no
scalewindowed=1.0
scalefullscreen=1.0